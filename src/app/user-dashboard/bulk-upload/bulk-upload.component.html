<div class="flex flex-col justify-center items-center min-h-screen bg-gray-100" style="
background-image: url('/assets/5474.jpg');
background-size: cover;
background-position: center;
background-repeat: no-repeat;
">
  
<div class="text-center space-y-8 mt-24 ">
<h1 class="text-4xl sm:text-5xl md:text-4xl font-extrabold py-2 bg-white rounded-lg text-gray-900 ">
  Upload Your Menu Using The Attached Template To Compare Prices with The Competitors.
</h1>
<!-- <p class="text-lg w-1/3 animate-pulse font-semibold sm:text-xl ml-[32.5%] bg-white py-2 text-gray-900 rounded-lg ">
  Click the button below to download your template now!
</p> -->
<div class="template-download-section">
  <button
        (click)="downloadTemplate()"
        class="relative group px-8 py-4  bg-white hover:bg-gray-900 hover:text-white text-gray-900 font-bold text-lg rounded-lg shadow-lg hover:shadow-xl transition-transform transform hover:scale-110 focus:outline-none"
      >
        <span class="absolute left-0 inset-y-0 w-0 bg-gray-600 opacity-10 group-hover:w-full transition-all duration-300 ease-out"></span>
        <span> &darr; Download Template</span>
        
      </button>
</div>
</div>
  
  <!-- Main Form -->
  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg mt-12" >
    <h1 class="text-4xl sm:text-3xl md:text-5xl items-center ml-10 font-extrabold text-gray-800">My Menu Upload</h1>
    <form [formGroup]="uploadForm" class="space-y-4">
      <div>
        <label for="file" class="block text-xl mt-8 font-semibold text-gray-700">Select Excel Files</label>
        <input 
          #fileInput
          type="file" 
          id="file" 
          formControlName="files" 
          (change)="onFilesSelected($event)" 
          accept=".xlsx,.xls"
          multiple
          class="mt-2 p-2 border border-gray-300 rounded-md w-full"
        />
      </div>
      <button 
        type="button" 
        (click)="uploadFiles()" 
        class="w-full bg-blue-600 text-white p-3 rounded-md hover:bg-blue-700 transition"
      >
        Upload
      </button>
    </form>
    <!-- Back Button -->
  <div class="mt-6 ">
    <button 
      (click)="goBack()" 
      class="mb-4 p-3 text-black text-xl hover:text-white hover:font-semibold bg-gray-400 hover:bg-gray-800 rounded-md shadow-md transition"
    >
      &larr; Back
    </button>
  
    <button
      class="bg-blue-300 text-black p-3 text-xl py-2 hover:font-semibold rounded ml-[40%] mb-4 hover:text-white hover:bg-blue-700"
      (click)="onSubmit()"
    >
    Open Reports &rarr;
    </button>
    </div>
  </div>

  
  
  
  
  <!-- Display uploaded files -->
  <div *ngIf="uploadedFiles.length > 0" class="w-full max-w-lg mt-8 bg-white p-6 rounded-lg shadow-lg">
    <h2 class="text-2xl font-bold text-gray-800 mb-4">Uploaded Files</h2>
    <table class="w-full border-collapse">
      <thead>
        <tr>
          <th class="border border-gray-300 p-2 text-left">File Name</th>
          <th class="border border-gray-300 p-2 text-left">Uploaded At</th>
          <th class="border border-gray-300 p-2 text-left">Download</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let file of uploadedFiles">
          <td class="border border-gray-300 p-2">{{ file.fileName }}</td>
          <td class="border border-gray-300 p-2">{{ file.uploadedAt | date:'short' }}</td>
          <td class="border border-gray-300 p-2">
            <a [href]="file.downloadUrl" class="text-blue-600 hover:underline" download>Download</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
