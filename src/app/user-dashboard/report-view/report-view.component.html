<div class="container mx-auto p-6">
  <!-- Header with navigation -->
  <div class="flex justify-between items-center mb-8">
    <button class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600" (click)="goBack()">
      &larr; Back to Reports
    </button>
    <div class="flex space-x-2">
      <button 
        class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 flex items-center gap-2"
        (click)="downloadReport()">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
        </svg>
        Download
      </button>
      <!-- Add Logout Button -->
      <button class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600" (click)="logout()">
        Logout
      </button>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div *ngIf="loading" class="fixed inset-0 z-50 bg-black bg-opacity-30 backdrop-blur-sm flex items-center justify-center">
    <div class="text-center">
      <div class="w-10 h-10 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-3"></div>
      <p class="text-sm text-gray-700">Loading...</p>
    </div>
  </div>

  <!-- Error Message -->
  <div *ngIf="error" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6" role="alert">
    <p>{{ error }}</p>
  </div>

  <!-- Report Content -->
  <div *ngIf="!loading && !error" class="bg-white rounded-lg shadow-lg overflow-hidden">
    <div class="bg-gray-800 text-white p-6">
      <h1 class="text-2xl font-bold">{{ reportTitle }}</h1>
      <p class="mt-2 text-gray-300">{{ reportDescription }}</p>
      <div class="mt-4 text-sm">
        <p><strong>Restaurant:</strong> {{ restaurantName }}</p>
        <p *ngIf="menuItemName"><strong>Menu Item:</strong> {{ menuItemName }}</p>
        <p><strong>Generated:</strong> {{ today | date:'medium' }}</p>
      </div>
    </div>
    
    <div class="p-6 overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th *ngFor="let header of tableHeaders" 
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
              {{ header }}
            </th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let row of tableData" class="hover:bg-gray-50">
            <td *ngFor="let cell of row; let i = index" 
                class="px-6 py-4 whitespace-nowrap text-sm" 
                [ngClass]="{'text-gray-900 font-medium': i === 0, 'text-gray-500': i !== 0}">
              {{ cell }}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
