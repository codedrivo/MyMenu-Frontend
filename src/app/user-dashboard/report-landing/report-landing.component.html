<div class="container mx-auto p-6">
  <!-- Header with navigation -->
  <div class="flex justify-between items-center mb-8">
    <button class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600" (click)="goBack()">
      &larr; Back to Reports
    </button>
    <h1 class="text-2xl font-bold">Report Dashboard for {{ restaurantName }}</h1>
    <!-- Add Logout Button -->
    <button class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600" (click)="logout()">
      Logout
    </button>
  </div>

  <!-- Loading Overlay -->
  <div *ngIf="loading" class="fixed inset-0 z-50 bg-black bg-opacity-30 backdrop-blur-sm flex items-center justify-center">
    <div class="text-center">
      <div class="w-10 h-10 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-3"></div>
      <p class="text-sm text-gray-700">Loading...</p>
    </div>
  </div>

  <!-- Error Message -->
  <div *ngIf="error" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6" role="alert">
    <p>{{ error }}</p>
  </div>

  <!-- Main Content -->
  <div *ngIf="!loading && !error" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- Available Reports Column -->
    <div class="lg:col-span-1">
      <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        <div class="bg-gray-800 text-white p-4">
          <h2 class="text-xl font-semibold">Available Reports</h2>
        </div>
        <div class="divide-y divide-gray-200">
          <div *ngFor="let report of availableReports" class="p-4 hover:bg-gray-50 transition duration-150">
            <h3 class="font-medium text-lg text-gray-900">{{ report.name }}</h3>
            <p class="text-sm text-gray-600 mt-1">{{ report.description }}</p>
            <div class="mt-3 flex space-x-3">
              <button 
                (click)="viewReport(report)" 
                class="px-3 py-1 bg-blue-600 text-white text-sm rounded hover:bg-blue-700 transition">
                View Online
              </button>
              <button 
                (click)="downloadReport(report)" 
                class="px-3 py-1 bg-green-600 text-white text-sm rounded hover:bg-green-700 transition"
                [disabled]="isDownloading"
                [ngClass]="{'opacity-50 cursor-not-allowed': isDownloading}">
                <ng-container *ngIf="!isDownloading">Download</ng-container>
                <ng-container *ngIf="isDownloading">
                  <span>{{ downloadProgress }}%</span>
                </ng-container>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Coming Soon Reports Column -->
    <div class="lg:col-span-2">
      <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        <div class="bg-gray-800 text-white p-4">
          <h2 class="text-xl font-semibold">Coming Soon</h2>
        </div>
        <div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
          <div *ngFor="let report of comingSoonReports" 
               class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition duration-150">
            <div class="flex items-start">
              <div class="flex-grow">
                <h3 class="font-medium text-gray-900">{{ report.name }}</h3>
                <p class="text-sm text-gray-600 mt-1">{{ report.description }}</p>
              </div>
              <span class="bg-yellow-100 text-yellow-800 text-xs font-medium px-2.5 py-0.5 rounded-full">Coming Soon</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
