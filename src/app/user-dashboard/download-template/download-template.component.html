    class="flex-1 lg:w-4/5 justify-center items-center min-h-screen bg-gray-200"
    
  > -->

<div class="min-h-screen bg-gray-100 flex items-center justify-center px-4"
style="
      background-image: url('/assets/6010.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    ">
    
    <div class="text-center space-y-8 ">
      
      
      <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold py-2 bg-white rounded-lg text-gray-900 ">
        Upload Your Menu Using The Attached Template To Compare Prices with The Competitors.
      </h1>
      <p class="text-lg w-1/3 animate-pulse font-semibold sm:text-xl ml-[32.5%] bg-white py-2 text-gray-900 rounded-lg ">
        Click the button below to download your template now!
      </p>
    <div class="space-x-8">
      <!-- Back Button -->
      <button
        (click)="goBack()"
        class="text-gray-900 hover:text-white hover:bg-blue-900 font-semibold text-lg bg-gray-300 px-4 py-2 rounded-lg shadow-md hover:shadow-lg transition duration-300 ease-in-out"
      >
        ← Back
      </button>
      <button
        (click)="downloadTemplate()"
        class="relative group px-8 py-4  bg-white hover:bg-gray-900 hover:text-white text-gray-900 font-bold text-lg rounded-lg shadow-lg hover:shadow-xl transition-transform transform hover:scale-110 focus:outline-none"
      >
        <span class="absolute left-0 inset-y-0 w-0 bg-gray-600 opacity-10 group-hover:w-full transition-all duration-300 ease-out"></span>
        <span *ngIf="!isLoading"> &darr; Download Template</span>
        <span *ngIf="isLoading">
          <svg
            class="animate-spin h-5 w-5 mx-auto text-white"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8v8H4z"
            ></path>
          </svg>
        </span>
      </button>
      <button 
      class="relative group px-8 py-4 bg-white hover:bg-gray-900 hover:text-white text-gray-900 font-bold text-lg rounded-lg shadow-lg hover:shadow-xl transition-transform transform hover:scale-110 focus:outline-none"
      (click)="onSubmit()">
        &uarr; New Upload
      </button>
      
      
      <p *ngIf="errorMessage" class="text-red-500 mt-4">{{ errorMessage }}</p>
    </div>
    </div>
  </div>
