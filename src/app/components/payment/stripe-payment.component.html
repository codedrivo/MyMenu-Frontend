<div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6 ">
  <!-- Header -->
  <div class="text-center mb-6 ">
    <h2 class="text-2xl font-bold text-gray-900">Complete Your Subscription</h2>
    <div class="mt-2">
      <span class="text-lg font-semibold text-blue-600">{{ selectedTier.displayName }}</span>
      <span class="text-gray-500"> - Monthly</span>
    </div>
    <div class="mt-1 text-2xl font-bold text-gray-900">
      ${{ getAmount() }}<span class="text-sm font-normal text-gray-500">/month</span>
    </div>
  </div>

  <!-- Customer Information -->
  <div class="space-y-4 mb-6 mt-24">
    <div>
      <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
        Email Address *
      </label>
      <input
        type="email"
        id="email"
        [(ngModel)]="customerInfo.email"
        required
        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        placeholder="your@email.com"
      />
    </div>

    <div>
      <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
        Full Name *
      </label>
      <input
        type="text"
        id="name"
        [(ngModel)]="customerInfo.name"
        required
        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        placeholder="John Doe"
      />
    </div>

    <div>
      <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">
        Phone Number
      </label>
      <input
        type="tel"
        id="phone"
        [(ngModel)]="customerInfo.phone"
        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        placeholder="+1 (555) 123-4567"
      />
    </div>
  </div>

  <!-- Card Element -->
  <div class="mb-6">
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Card Information *
    </label>
    <div 
      #cardElement 
      class="w-full p-3 border border-gray-300 rounded-md focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-transparent"
    ></div>
  </div>

  <!-- Action Buttons -->
  <div class="flex space-x-3">
    <button
      (click)="onCancel()"
      [disabled]="paymentProcessing"
      class="flex-1 py-2 px-4 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50"
    >
      Cancel
    </button>
    
    <button
      (click)="processPayment()"
      [disabled]="paymentProcessing || isLoading || !customerInfo.email || !customerInfo.name"
      class="flex-1 py-2 px-4 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed"
    >
      <span *ngIf="!paymentProcessing && !isLoading">
        Subscribe Now
      </span>
      <span *ngIf="isLoading" class="flex items-center justify-center">
        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Initializing...
      </span>
      <span *ngIf="paymentProcessing" class="flex items-center justify-center">
        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Processing...
      </span>
    </button>
  </div>

  <!-- Security Notice -->
  <div class="mt-4 text-center ">
    <p class="text-xs text-gray-500">
      <svg class="w-4 h-4 inline-block mr-1" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path>
      </svg>
      Secured by Stripe. Your payment information is encrypted and secure.
    </p>
  </div>
</div>
