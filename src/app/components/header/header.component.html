    <!-- Right Side Action Buttons - Visible on large screens and above --> 
    <div class="hidden lg:flex items-center space-x-1 lg:space-x-2 xl:space-x-3 flex-shrink-0"> 
      


      <!-- Show these buttons only when NOT logged in --> 
      <ng-container *ngIf="authUiEnabled && !isLoggedIn"> 
        <a routerLink="/letsstart" 
           class="btn btn-primary sm"> 
          Get Started
        </a> 
        <button class="btn btn-outline watch-demo" (click)="openDemoVideo()">Watch The Demo</button>

           routerLinkActive="active"  
           class="btn btn-outline sm"> 
          Login
        </a> 
        
      </ng-container> 


    <!-- My Account dropdown when logged in (desktop) --> 
    <ng-container *ngIf="isLoggedIn"> 
      <div class="relative account-menu"> 
        <button (click)="toggleAccountMenu()"

    </ng-container>

          QUICK SEARCH 
        </a> 
        <a routerLink="/contact"  
             routerLinkActive="active"

        <!-- Action Buttons -->

            class="btn btn-primary w-100"> 
            Get Started
              </a> 
              <button class="btn btn-outline watch-demo w-100" (click)="openDemoVideo()">Watch The Demo</button>
              <a routerLink="/login"  
                routerLinkActive="active"  
                class="btn btn-outline w-100"> 
                Login
              </a> 
          </ng-container> 


    <!-- Show Sign Out when logged in (mobile) --> 
    <ng-container *ngIf="isLoggedIn"> 
      <button (click)="logout($event)"  
              class="block w-full px-4 py-3 bg-red-600 text-white rounded-md text-center font-medium hover:bg-red-700 transition-all duration-300"> 
        SIGN OUT 
      </button> 
    </ng-container> 


    <!-- My Account dropdown when logged in (mobile) --> 
    <ng-container *ngIf="isLoggedIn"> 
    <div class="relative account-menu"> 
    <button (click)="toggleAccountMenu()"  
    class="block w-full px-4 py-3 bg-gray-800 text-white rounded-md text-center font-medium hover:bg-gray-900 transition-all duration-300"> 
    MY ACCOUNT 
    </button> 
    <div *ngIf="isAccountMenuOpen" class="mt-2 bg-white border rounded-md shadow-lg"> 
    <a routerLink="/my-account" (click)="closeMenu()" class="block px-4 py-3 text-sm hover:bg-gray-100">Account Settings</a>

<!-- Logout Confirmation Popup --> 
<div *ngIf="showLogoutConfirmation"  
     class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4"> 
  <div class="bg-white p-6 rounded-lg shadow-xl max-w-md w-full mx-4 transform transition-all duration-300 scale-100 logout-confirmation"> 
    <h2 class="text-xl font-bold mb-4 text-gray-800">Confirm Logout</h2> 
    <p class="mb-6 text-gray-600">Are you sure you want to log out?</p> 
    <div class="flex justify-end space-x-4"> 
      <button (click)="cancelLogout()"  
              class="px-4 py-2 bg-gray-300 text-gray-800 rounded hover:bg-gray-400 transition-all duration-300 font-medium"> 
        Cancel 
      </button> 
      <button (click)="confirmLogout()"  
              class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 transition-all duration-300 font-medium"> 
        Logout 
      </button> 
    </div> 
  </div> 
</div> 


<!-- Custom Styles --> 
<style> 
  .active { 
    background-color: #2d3748 !important; 
    color: white !important; 
  } 


  .nav-link.active { 
    background-color: #2d3748 !important; 
    color: white !important; 
  } 


  .mobile-nav-link.active { 
    background-color: #2d3748 !important; 
    color: white !important; 
  } 


  /* Smooth animations for mobile menu */ 
  @media (max-width: 768px) { 
    .mobile-nav-link { 
      transform: translateX(-10px); 
      opacity: 0; 
      animation: slideInLeft 0.3s ease-out forwards; 
    } 


    .mobile-nav-link:nth-child(1) { animation-delay: 0.1s; } 
    .mobile-nav-link:nth-child(2) { animation-delay: 0.15s; } 
    .mobile-nav-link:nth-child(3) { animation-delay: 0.2s; } 
    .mobile-nav-link:nth-child(4) { animation-delay: 0.25s; } 
    .mobile-nav-link:nth-child(5) { animation-delay: 0.3s; } 
    .mobile-nav-link:nth-child(6) { animation-delay: 0.35s; } 
    .mobile-nav-link:nth-child(7) { animation-delay: 0.4s; } 
  } 


  @keyframes slideInLeft { 
    to { 
      transform: translateX(0); 
      opacity: 1; 
    } 
  } 


  /* Responsive font sizes */ 
  @media (min-width: 1536px) { 
    .nav-link { 
      font-size: 0.95rem; 
      padding: 0.75rem 1rem; 
    } 
  } 


  /* Ensure proper spacing on very small devices */ 
  @media (max-width: 320px) { 
    header { 
      padding-left: 0.5rem; 
      padding-right: 0.5rem; 
    } 


    .nav-link, .mobile-nav-link { 
      font-size: 0.8rem; 
      padding: 0.5rem; 
    } 
  } 
</style>
