<div class="flex justify-center items-center min-h-screen bg-gray-200 mt-12"
     style="background-image: url('/assets/googleoauth.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat;">
  <div class="w-full max-w-md p-8 bg-white/60 backdrop-blur-lg rounded-3xl shadow-xl border border-gray-300">
    <div class="text-center mb-6">
      <h2 class="text-4xl font-bold text-gray-800 tracking-wide">
        Login / Signup
      </h2>
      <div class="mt-4 flex gap-2 justify-center">
        <button type="button" class="px-3 py-1 rounded-full border"
                [class.bg-blue-600]="mode==='password'" [class.text-white]="mode==='password'"
                (click)="switchMode('password')">Password Login</button>
        <button type="button" class="px-3 py-1 rounded-full border"
                [class.bg-blue-600]="mode==='otp-login'" [class.text-white]="mode==='otp-login'"
                (click)="switchMode('otp-login')">Login with Code</button>
        <button type="button" class="px-3 py-1 rounded-full border"
                [class.bg-blue-600]="mode==='otp-register'" [class.text-white]="mode==='otp-register'"
                (click)="switchMode('otp-register')">Register via Email (Code)</button>
      </div>
    </div>
    
    <!-- Reactive Form -->
    <form [formGroup]="myForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Email Field -->
      <div>
        <label class="block text-sm font-medium text-gray-700 cursor-pointer" for="username">
          E-mail
        </label>
        <div class="relative mt-1">
          <input
            type="email"
            formControlName="username"
            id="username"
            class="w-full p-3 rounded-xl border border-gray-300 bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-900 shadow-md transition-transform hover:scale-105"
            placeholder="Enter your email"
          />
        </div>
        <div *ngIf="myForm.get('username')?.invalid && myForm.get('username')?.touched" class="text-red-500 text-sm mt-1">
          Email is required.
        </div>
      </div>

      <!-- Password Field (Password mode only) -->
      <div *ngIf="mode==='password'">
        <label class="block text-sm font-medium text-gray-700 cursor-pointer" for="password">
          Password
        </label>
        <div class="relative mt-1">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            id="password"
            class="w-full p-3 pr-12 rounded-xl border border-gray-300 bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-900 shadow-md transition-transform hover:scale-105"
            placeholder="Enter your password"
          />
          <button 
            type="button" 
            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none"
            (click)="togglePasswordVisibility()"
          >
            <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2" fill="none"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
            </svg>
            <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="m1 1 22 22" stroke="currentColor" stroke-width="2"/>
              <path d="M6.71 6.71C4.68 8.04 3 10.5 3 12s1.68 3.96 3.71 5.29" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="M17.29 17.29C19.32 15.96 21 13.5 21 12s-1.68-3.96-3.71-5.29" stroke="currentColor" stroke-width="2" fill="none"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
            </svg>
          </button>
        </div>
        <div *ngIf="myForm.get('password')?.invalid && myForm.get('password')?.touched" class="text-red-500 text-sm mt-1">
          Password is required (minimum 6 characters).
        </div>
      </div>

      <!-- Code Field (OTP modes) -->
      <div *ngIf="mode!=='password'">
        <label class="block text-sm font-medium text-gray-700 cursor-pointer" for="otp">
          One-Time Code
        </label>
        <div class="relative mt-1">
          <input
            type="text"
            formControlName="otp"
            id="otp"
            inputmode="numeric"
            autocomplete="one-time-code"
            maxlength="6"
            (input)="onOtpInput($event)"
            class="w-full p-3 rounded-xl border border-gray-300 bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-900 shadow-md transition-transform hover:scale-105"
            placeholder="Enter Code"
          />
        </div>
        <div *ngIf="myForm.get('otp')?.invalid && myForm.get('otp')?.touched" class="text-red-500 text-sm mt-1">
          Code must be exactly 6 digits.
        </div>
      </div>

      <!-- Error/Status Messages -->
      <div *ngIf="errorMessage" class="text-red-500 text-sm text-center">
        {{ errorMessage }}
      </div>
      <div *ngIf="otpMessage && mode!=='password'" class="text-green-600 text-sm text-center">
        {{ otpMessage }}
      </div>

      <!-- Login Button (Password mode) -->
      <div *ngIf="mode==='password'">
        <button
          type="submit"
          class="w-full py-3 px-4 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-xl shadow-lg transform transition-transform duration-200 hover:scale-105 focus:ring-4 focus:ring-blue-300 focus:outline-none cursor-pointer"
          [disabled]="myForm.invalid"
        >
          Login
        </button>
      </div>

      <!-- Code Action Buttons -->
      <div *ngIf="mode==='otp-login'" class="flex gap-2">
        <button type="button"
                class="flex-1 py-3 px-4 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-xl shadow-lg focus:ring-4 focus:ring-blue-300 focus:outline-none cursor-pointer"
                (click)="sendLoginOtp()">
          {{ isOtpSent ? 'Resend Login Code' : 'Send Login Code' }}
        </button>
        <button type="button"
                class="flex-1 py-3 px-4 bg-green-500 hover:bg-green-600 text-white font-semibold rounded-xl shadow-lg focus:ring-4 focus:ring-green-300 focus:outline-none cursor-pointer"
                [disabled]="!isOtpSent || myForm.get('otp')?.invalid"
                (click)="verifyLoginOtp()">
          Verify & Login
        </button>
      </div>

      <div *ngIf="mode==='otp-register'" class="flex gap-2">
        <button type="button"
                class="flex-1 py-3 px-4 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-xl shadow-lg focus:ring-4 focus:ring-blue-300 focus:outline-none cursor-pointer"
                (click)="sendRegistrationOtp()">
          {{ isOtpSent ? 'Resend Registration Code' : 'Send Registration Code' }}
        </button>
        <button type="button"
                class="flex-1 py-3 px-4 bg-green-500 hover:bg-green-600 text-white font-semibold rounded-xl shadow-lg focus:ring-4 focus:ring-green-300 focus:outline-none cursor-pointer"
                [disabled]="!isOtpSent || myForm.get('otp')?.invalid"
                (click)="verifyRegistrationOtp()">
          Verify & Continue Signup
        </button>
      </div>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <div class="flex-grow border-t border-gray-300"></div>
        <span class="px-4 text-gray-500 text-sm">or</span>
        <div class="flex-grow border-t border-gray-300"></div>
      </div>

      <!-- Google OAuth Login -->
      <div>
        <button
          type="button"
          (click)="continueWithGoogle()"
          class="w-full py-3 px-4 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold rounded-xl shadow-lg transform transition-transform duration-200 hover:scale-105 focus:ring-4 focus:ring-gray-300 focus:outline-none cursor-pointer flex items-center justify-center gap-3"
        >
          <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.9 0-12.5-5.6-12.5-12.5S17.1 11 24 11c3.2 0 6.1 1.2 8.3 3.2l5.7-5.7C34.7 5.1 29.6 3 24 3 12.3 3 3 12.3 3 24s9.3 21 21 21c10.5 0 19.4-7.6 20.9-17.5.1-.8.2-1.6.2-2.5 0-1-.1-2-.3-3z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.4 16 19 13 24 13c3.2 0 6.1 1.2 8.3 3.2l5.7-5.7C34.7 5.1 29.6 3 24 3 15.7 3 8.6 7.4 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 45c5.3 0 10.2-2 13.9-5.3l-6.4-5.2C29.6 36.8 26.9 38 24 38c-5.3 0-9.8-3.4-11.5-8.1l-6.6 5.1C8.3 41.6 15.6 45 24 45z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1 2.8-3 5.2-5.6 6.7l6.4 5.2C38.6 37.8 42 31.4 42 24c0-1-.1-2-.4-3.5z"/>
          </svg>
          Continue with Google
        </button>
      </div>

      <!-- Microsoft OAuth Login -->
      <div class="mt-3">
        <button
          type="button"
          (click)="continueWithMicrosoft()"
          class="w-full py-3 px-4 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold rounded-xl shadow-lg transform transition-transform duration-200 hover:scale-105 focus:ring-4 focus:ring-gray-300 focus:outline-none cursor-pointer flex items-center justify-center gap-3"
        >
          <svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="0" y="0" width="9" height="9" fill="#F35325"/>
            <rect x="11" y="0" width="9" height="9" fill="#81BC06"/>
            <rect x="0" y="11" width="9" height="9" fill="#05A6F0"/>
            <rect x="11" y="11" width="9" height="9" fill="#FFBA08"/>
          </svg>
          Continue with Microsoft
        </button>
      </div>

      <!-- <div class="text-center">
        <p class="text-gray-500">Not yet registered? 
          <a href="/signup" class="text-blue-600 cursor-pointer hover:text-blue-800 font-medium hover:underline">
            Click here
          </a>
        </p>
      </div> -->
    </form>
  </div>
</div>
